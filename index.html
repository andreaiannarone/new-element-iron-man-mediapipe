<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Element - Iron Man - Mediapipe</title>

  <!-- Primary Meta Tags -->
  <meta name="title" content="New Element - Iron Man - Mediapipe">
  <meta name="description" content="control with hand gestures and face tracking">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Play', 'sans-serif'],
            mono: ['Play', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html,
    body,
    #root {
      font-family: 'Play', sans-serif;
    }

    *,
    *::before,
    *::after {
      font-family: inherit;
    }

    .font-sans,
    .font-mono,
    .lil-gui,
    .lil-gui * {
      font-family: 'Play', sans-serif !important;
    }

    body {
      background-color: #09090b;
      color: #e4e4e7;
    }

    /* Custom scrollbar for webkit */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #18181b;
    }

    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }

    /* GUI overrides */
    .lil-gui {
      --background-color: #18181b;
      --text-color: #e4e4e7;
      --title-background-color: #27272a;
      --widget-color: #3f3f46;
      --hover-color: #52525b;
      --focus-color: #52525b;
      --number-color: #60a5fa;
      --string-color: #60a5fa;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
